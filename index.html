<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia dos Clãs — Sangue & Safira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>

    /* ── TOKENS ────────────────────────────────────────────── */
    :root {
      --bg:        #07030a;
      --bg2:       #100818;
      --bg3:       #180d20;
      --bg-card:   #0f0814;
      --blood:     #8b0000;
      --blood2:    #c41230;
      --blood3:    #e8183a;
      --gold:      #c8962a;
      --gold2:     #e8b84a;
      --text:      #d4c4b0;
      --text2:     #8a7a6a;
      --text3:     #5a4a3a;
      --border:    rgba(139,0,0,0.2);
      --border2:   rgba(139,0,0,0.45);
      --sidebar-w: 280px;
      --radius:    2px;
    }

    /* ── RESET ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 17px;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Blood drip texture at very top */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--blood) 20%, var(--blood2) 50%, var(--blood) 80%, transparent);
      z-index: 1000;
      box-shadow: 0 0 20px rgba(196,18,48,0.6), 0 0 40px rgba(139,0,0,0.3);
    }

    /* ── BACKGROUND TEXTURE ────────────────────────────────── */
    .bg-texture {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(139,0,0,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(100,0,80,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── LAYOUT ────────────────────────────────────────────── */
    .layout {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── SIDEBAR ───────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: linear-gradient(180deg, #0a0310 0%, #070215 50%, #0a0318 100%);
      border-right: 1px solid var(--border2);
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    }

    #sidebar::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 1px; height: 100%;
      background: linear-gradient(180deg, transparent, var(--blood2) 30%, var(--blood) 50%, var(--blood2) 70%, transparent);
      opacity: 0.5;
    }

    .sidebar-brand {
      padding: 32px 20px 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .sidebar-brand::after {
      content: '✦ ✦ ✦';
      display: block;
      font-size: 10px;
      color: var(--blood);
      letter-spacing: 8px;
      margin-top: 10px;
    }

    .brand-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold2);
      letter-spacing: 0.08em;
      line-height: 1.3;
      text-shadow: 0 0 20px rgba(200,150,42,0.4);
    }

    .brand-sub {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--blood2);
      margin-top: 6px;
    }

    .sidebar-section-label {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 16px 20px 6px;
    }

    /* NAV ITEMS */
    #clanNav { flex: 1; padding: 6px 0 20px; }

    .clan-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--text2);
      border-left: 2px solid transparent;
      position: relative;
      user-select: none;
    }

    .clan-nav-item:hover {
      background: rgba(139,0,0,0.08);
      color: var(--text);
      border-left-color: var(--blood);
    }

    .clan-nav-item.active {
      background: rgba(139,0,0,0.14);
      color: var(--gold2);
      border-left-color: var(--blood2);
    }

    .nav-symbol {
      font-size: 14px;
      width: 20px;
      text-align: center;
      opacity: 0.8;
    }

    .nav-name { flex: 1; }

    .nav-arrow {
      font-size: 10px;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.15s, transform 0.15s;
      color: var(--blood2);
    }
    .clan-nav-item:hover .nav-arrow,
    .clan-nav-item.active .nav-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text3);
      text-align: center;
    }

    /* ── MAIN ──────────────────────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
    }

    /* ── INTRO PAGE ────────────────────────────────────────── */
    .intro-page {
      padding: 80px 60px;
      max-width: 820px;
    }

    .page-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--blood2);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-eyebrow::before {
      content: '';
      width: 40px; height: 1px;
      background: var(--blood2);
    }

    .intro-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 38px;
      font-weight: 900;
      line-height: 1.1;
      color: var(--gold2);
      text-shadow: 0 0 40px rgba(200,150,42,0.2);
      margin-bottom: 10px;
    }

    .intro-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      color: var(--blood2);
      margin-bottom: 40px;
    }

    .blood-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 32px 0;
    }
    .blood-divider::before, .blood-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--blood));
    }
    .blood-divider::after { background: linear-gradient(90deg, var(--blood), transparent); }
    .blood-divider-icon {
      color: var(--blood2);
      font-size: 14px;
    }

    .intro-text {
      font-size: 17px;
      color: var(--text2);
      line-height: 1.8;
      margin-bottom: 20px;
      font-style: italic;
    }

    /* CLAN GRID */
    .clan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 48px;
    }

    .clan-thumb {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 20px 16px 18px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, background 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .clan-thumb::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(139,0,0,0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .clan-thumb:hover {
      border-color: var(--blood2);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139,0,0,0.15);
    }
    .clan-thumb:hover::before { opacity: 1; }

    .clan-thumb-symbol {
      font-size: 28px;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }
    .clan-thumb-name {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1.3;
    }
    .clan-thumb-nick {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      color: var(--text3);
      margin-top: 5px;
      font-style: italic;
    }

    /* ── CLAN DETAIL PAGE ──────────────────────────────────── */
    .clan-page { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* CLAN HEADER */
    .clan-header {
      padding: 60px 60px 48px;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .clan-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 80% 50%, var(--clan-color, #8b0000) 0%, transparent 55%),
        linear-gradient(180deg, rgba(7,3,10,0) 0%, rgba(7,3,10,0.8) 100%);
      opacity: 0.08;
      pointer-events: none;
    }

    /* Blood heartbeat pulse on open */
    .clan-header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, var(--blood2) 0%, transparent 60%);
      opacity: 0;
      animation: heartbeat 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes heartbeat {
      0%   { opacity: 0.15; transform: scale(0.8); }
      40%  { opacity: 0.06; transform: scale(1.1); }
      100% { opacity: 0; transform: scale(1.2); }
    }

    .clan-header-inner {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 32px;
      max-width: 800px;
    }

    .clan-big-symbol {
      font-size: 64px;
      line-height: 1;
      flex-shrink: 0;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.8));
    }

    .clan-header-text { flex: 1; }

    .clan-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--blood2);
      margin-bottom: 10px;
    }

    .clan-name {
      font-family: 'Cinzel Decorative', serif;
      font-size: 36px;
      font-weight: 900;
      color: var(--gold2);
      line-height: 1.1;
      text-shadow: 0 0 30px rgba(200,150,42,0.15);
    }

    .clan-alcunhas {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .alcunha-pill {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blood2);
      border: 1px solid rgba(196,18,48,0.3);
      background: rgba(139,0,0,0.08);
      padding: 3px 10px;
    }

    .clan-quote {
      margin-top: 20px;
      font-style: italic;
      font-size: 16px;
      color: var(--text2);
      border-left: 2px solid var(--blood);
      padding-left: 16px;
      max-width: 520px;
      line-height: 1.6;
    }

    /* BACK NAV */
    .clan-nav-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,3,10,0.8);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    .back-btn {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text3);
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--blood2); }
    .breadcrumb-sep { color: var(--text3); font-size: 12px; }
    .breadcrumb-current {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--gold);
    }

    /* CLAN TABS */
    .clan-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      padding: 0 60px;
      background: var(--bg2);
    }
    .clan-tab {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 14px 18px;
      border: none;
      background: none;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .clan-tab:hover { color: var(--text); }
    .clan-tab.active { color: var(--blood2); border-bottom-color: var(--blood2); }

    /* CLAN BODY */
    .clan-body {
      display: grid;
      grid-template-columns: 1fr 280px;
      max-width: 1100px;
    }

    .clan-main { padding: 44px 60px; border-right: 1px solid var(--border); }
    .clan-side { padding: 44px 36px; }

    /* SECTION TITLES */
    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--blood2);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border2), transparent);
    }

    .clan-resumo {
      font-size: 18px;
      color: var(--text);
      line-height: 1.75;
      margin-bottom: 44px;
    }

    .clan-historia {
      font-size: 16px;
      color: var(--text2);
      line-height: 1.8;
      margin-bottom: 44px;
    }

    /* SIDE CARDS */
    .side-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 2px solid var(--blood);
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
    }
    .side-card-title {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--blood2);
      margin-bottom: 12px;
    }

    /* DISCIPLINAS */
    .disc-list { display: flex; flex-direction: column; gap: 8px; }
    .disc-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--text);
      letter-spacing: 0.04em;
    }
    .disc-item::before {
      content: '⬥';
      color: var(--blood2);
      font-size: 8px;
      flex-shrink: 0;
    }

    /* PERDICAO */
    .perdicao-text {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.65;
      font-style: italic;
    }

    /* FOME */
    .fome-text {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.65;
    }

    /* BLOOD DROP accent */
    .blood-drop {
      display: inline-block;
      width: 8px; height: 10px;
      background: var(--blood2);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      transform: rotate(15deg);
      margin-right: 6px;
      flex-shrink: 0;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--blood); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--blood2); }

    /* MOBILE TOGGLE */
    #menuToggle {
      display: none;
      position: fixed;
      top: 18px; left: 18px;
      z-index: 200;
      background: var(--bg2);
      border: 1px solid var(--border2);
      padding: 8px 11px;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
    }
    #menuToggle span {
      display: block;
      width: 20px; height: 1px;
      background: var(--blood2);
      transition: all 0.25s;
    }
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 99;
    }

    /* ORNAMENT */
    .ornament {
      text-align: center;
      color: var(--blood);
      font-size: 12px;
      letter-spacing: 12px;
      padding: 16px 0;
      opacity: 0.6;
    }

    @media (max-width: 900px) {
      .clan-body { grid-template-columns: 1fr; }
      .clan-main { border-right: none; border-bottom: 1px solid var(--border); }
    }
    @media (max-width: 680px) {
      #menuToggle { display: flex; }
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); box-shadow: 6px 0 40px rgba(0,0,0,0.8); }
      #overlay.open { display: block; }
      #main { margin-left: 0; }
      .intro-page { padding: 40px 24px; }
      .intro-title { font-size: 26px; }
      .clan-header { padding: 40px 24px 36px; }
      .clan-nav-bar, .clan-tabs { padding-left: 24px; padding-right: 24px; }
      .clan-main { padding: 32px 24px; }
      .clan-side { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<div class="bg-texture"></div>

<button id="menuToggle" aria-label="Menu">
  <span></span><span></span><span></span>
</button>

<div class="layout">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-title">Sangue<br>&amp; Safira</div>
      <div class="brand-sub">Guia dos Clãs · V5</div>
    </div>

    <div class="sidebar-section-label">Os Treze Clãs</div>
    <nav id="clanNav"></nav>

    <div class="sidebar-footer">Vampiro: A Máscara · 5ª Edição</div>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <div id="introPage"></div>
    <div id="clanDetail" style="display:none"></div>
  </main>

</div>

<div id="overlay"></div>

<script src="clans.js"></script>
<script>

const $ = id => document.getElementById(id);
let currentClan = null;

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', () => {
  buildNav();
  renderIntro();
  setupMobile();
});

/* ── NAV ── */
function buildNav() {
  const nav = $('clanNav');
  nav.innerHTML = CLANS.map(c => `
    <div class="clan-nav-item ${currentClan?.id === c.id ? 'active' : ''}" onclick="showClan('${c.id}')">
      <span class="nav-symbol">${c.simbolo}</span>
      <span class="nav-name">${c.nome}</span>
      <span class="nav-arrow">›</span>
    </div>
  `).join('');
}

/* ── INTRO ── */
function renderIntro() {
  $('introPage').innerHTML = `
    <div class="intro-page">
      <div class="page-eyebrow">Sangue &amp; Safira · Campanha</div>
      <h1 class="intro-title">Guia dos Clãs</h1>
      <div class="intro-subtitle">Vampiro: A Máscara · 5ª Edição</div>

      <div class="blood-divider"><span class="blood-divider-icon">✦</span></div>

      <p class="intro-text">
        Na noite eterna de Vampiro: A Máscara, treze clãs dividem o mundo dos mortos-vivos.
        Cada um carrega séculos de história, filosofia própria e uma maldição singular —
        a herança de Caim, o Primeiro Assassino.
      </p>
      <p class="intro-text">
        Selecione um clã para explorar suas origens, disciplinas, o sabor único de sua fome
        e a perdição que aguarda no fundo de cada noite.
      </p>

      <div class="blood-divider"><span class="blood-divider-icon">🩸</span></div>

      <div class="clan-grid" id="clanGrid">
        ${CLANS.map(c => `
          <div class="clan-thumb" onclick="showClan('${c.id}')" style="--clan-color:${c.cor}">
            <span class="clan-thumb-symbol">${c.simbolo}</span>
            <span class="clan-thumb-name">${c.nome}</span>
            <span class="clan-thumb-nick">${c.alcunhas[0]}</span>
          </div>
        `).join('')}
      </div>

      <div class="ornament" style="margin-top:60px">✦ ✦ ✦</div>
    </div>
  `;
}

/* ── CLAN DETAIL ── */
function showClan(id) {
  const c = CLANS.find(x => x.id === id);
  if (!c) return;
  currentClan = c;
  buildNav();

  $('introPage').style.display = 'none';
  $('clanDetail').style.display = 'block';

  $('clanDetail').innerHTML = `
    <div class="clan-page" style="--clan-color:${c.cor}">

      <div class="clan-nav-bar">
        <button class="back-btn" onclick="showIntro()">← Todos os Clãs</button>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current">${c.nome}</span>
      </div>

      <div class="clan-header">
        <div class="clan-header-inner">
          <div class="clan-big-symbol">${c.simbolo}</div>
          <div class="clan-header-text">
            <div class="clan-eyebrow">Clã</div>
            <h2 class="clan-name">${c.nome}</h2>
            <div class="clan-alcunhas">
              ${c.alcunhas.map(a => `<span class="alcunha-pill">${a}</span>`).join('')}
            </div>
            <blockquote class="clan-quote">${c.citacao}</blockquote>
          </div>
        </div>
      </div>

      <div class="clan-body">
        <div class="clan-main">

          <p class="section-label">Resumo</p>
          <p class="clan-resumo">${c.resumo}</p>

          <div class="blood-divider"><span class="blood-divider-icon">✦</span></div>

          <p class="section-label">História</p>
          <p class="clan-historia">${c.historia}</p>

        </div>

        <div class="clan-side">

          <div class="side-card">
            <div class="side-card-title">Disciplinas</div>
            <div class="disc-list">
              ${c.disciplinas.map(d => `<div class="disc-item">${d}</div>`).join('')}
            </div>
          </div>

          <div class="side-card">
            <div class="side-card-title">⚠ Perdição</div>
            <p class="perdicao-text">${c.perdicao}</p>
          </div>

          <div class="side-card">
            <div class="side-card-title">🩸 Fome</div>
            <p class="fome-text">${c.fome}</p>
          </div>

        </div>
      </div>

      <div class="ornament" style="padding:32px 0">✦ ✦ ✦</div>

    </div>
  `;

  $('main').scrollTo(0, 0);
  // scroll sidebar item into view
  const active = document.querySelector('.clan-nav-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  // close mobile menu
  $('sidebar').classList.remove('open');
  $('overlay').classList.remove('open');
}

function showIntro() {
  currentClan = null;
  buildNav();
  $('introPage').style.display = 'block';
  $('clanDetail').style.display = 'none';
  $('main').scrollTo(0, 0);
}

/* ── MOBILE ── */
function setupMobile() {
  $('menuToggle').addEventListener('click', () => {
    const open = $('sidebar').classList.toggle('open');
    $('overlay').classList.toggle('open', open);
  });
  $('overlay').addEventListener('click', () => {
    $('sidebar').classList.remove('open');
    $('overlay').classList.remove('open');
  });
}

</script>
</body>
</html>
